server:
  port: 8080
  servlet:
    context-path: /
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

spring:
  application:
    name: my-tools
  datasource:
    # MySQL 8.0 驱动类
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mytools?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
    open-in-view: false
  thymeleaf:
    cache: false
    mode: HTML
    encoding: UTF-8
    prefix: classpath:/templates/
    suffix: .html

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# 自定义配置
mytools:
  qrcode:
    width: 300
    height: 300
  portscan:
    # 端口扫描线程池大小
    threads: 64
    # Socket 连接超时（毫秒）
    timeout: 300
