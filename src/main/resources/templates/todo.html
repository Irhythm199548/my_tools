<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments :: head('待办事项 · my tools')}"></head>
<body>
<div th:replace="~{fragments :: nav('todo')}"></div>

<div class="container mt-4">
    <h4 class="section-title">📝 待办事项</h4>

    <div class="row">
        <div class="col-lg-5">
            <div class="card mb-3">
                <div class="card-header fw-bold" id="formTitle">新增待办</div>
                <div class="card-body">
                    <input type="hidden" id="todoId">
                    <div class="mb-2">
                        <input class="form-control" id="title" placeholder="标题 *（如“明天晚上拿快递”会自动识别时间）" required oninput="onTitleInput()">
                    </div>
                    <div class="mb-2">
                        <textarea class="form-control" id="description" rows="2" placeholder="描述"></textarea>
                    </div>
                    <div class="row g-2 mb-2">
                        <div class="col-6">
                            <select class="form-select" id="priority">
                                <option value="LOW">低</option>
                                <option value="MEDIUM" selected>中</option>
                                <option value="HIGH">高</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <input type="datetime-local" class="form-control" id="dueDate" step="1" placeholder="截止时间" onchange="manualTime=true;$('#timeHint').addClass('d-none');">
                            <small id="timeHint" class="text-info d-none mt-1 d-block"></small>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" onclick="submitTodo()">保存</button>
                        <button class="btn btn-outline-secondary" onclick="resetForm()">重置</button>
                    </div>
                </div>
            </div>

            <div class="btn-group mb-3" role="group">
                <button class="btn btn-outline-primary active" onclick="filter(null,this)">全部</button>
                <button class="btn btn-outline-primary" onclick="filter(false,this)">未完成</button>
                <button class="btn btn-outline-primary" onclick="filter(true,this)">已完成</button>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="table-responsive">
                <table class="table table-hover align-middle bg-white">
                    <thead><tr><th>状态</th><th>标题</th><th>优先级</th><th>截止</th><th>操作</th></tr></thead>
                    <tbody id="todoBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let currentFilter = null;
    let parseTimer = null;
    let manualTime = false; // 用户是否手动改过时间

    // 服务器 "yyyy-MM-dd HH:mm:ss" -> input[datetime-local] "yyyy-MM-ddTHH:mm:ss"
    function serverToLocal(v) {
        if (!v) return '';
        return v.substring(0, 19).replace(' ', 'T');
    }
    // input[datetime-local] "2026-07-21T20:00[:ss]" -> 服务器 "yyyy-MM-dd HH:mm:ss"
    function localToServer(v) {
        if (!v) return null;
        let s = v.replace('T', ' ');
        if (s.length <= 16) s += ':00'; // 补足秒
        return s;
    }

    // 标题输入变化时，防抖调用后端解析时间并自动填充
    function onTitleInput() {
        if (manualTime) return; // 手动设过时间就不再自动覆盖
        clearTimeout(parseTimer);
        const title = $('#title').val();
        if (!title) { $('#timeHint').addClass('d-none'); return; }
        parseTimer = setTimeout(function () {
            $.ajax({
                url: '/api/todos/parse-time',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ text: title }),
                cache: false
            }).done(function (res) {
                const d = res.data || {};
                if (d.matched && d.dueDate) {
                    $('#dueDate').val(serverToLocal(d.dueDate));
                    $('#timeHint').removeClass('d-none')
                        .text('🪄 已从标题识别时间：' + d.dueDate + '（可手动修改）');
                } else {
                    $('#timeHint').addClass('d-none');
                }
            });
        }, 600);
    }

    function loadTodos() {
        let url = '/api/todos';
        if (currentFilter !== null) url += '?completed=' + currentFilter;
        $.get(url, function (res) {
            const body = $('#todoBody');
            body.empty();
            if (!res.data || res.data.length === 0) {
                body.append('<tr><td colspan="5" class="text-muted text-center">暂无数据</td></tr>');
                return;
            }
            res.data.forEach(t => {
                const badge = t.priority === 'HIGH' ? 'bg-danger' : t.priority === 'MEDIUM' ? 'bg-warning' : 'bg-secondary';
                const checked = t.completed ? 'checked' : '';
                body.append(
                    `<tr>
                        <td><input type="checkbox" ${checked} onchange="toggleTodo(${t.id})"></td>
                        <td class="${t.completed ? 'text-decoration-line-through text-muted' : ''}">${esc(t.title)}</td>
                        <td><span class="badge ${badge}">${t.priority}</span></td>
                        <td>${t.dueDate ? t.dueDate : '-'}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="editTodo(${t.id})">编辑</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="delTodo(${t.id})">删</button>
                        </td>
                    </tr>`
                );
            });
        });
    }

    function submitTodo() {
        const id = $('#todoId').val();
        const local = $('#dueDate').val();
        const payload = {
            title: $('#title').val(),
            description: $('#description').val(),
            priority: $('#priority').val(),
            completed: false,
            dueDate: local ? localToServer(local) : null
        };
        if (!payload.title) { alert('请填写标题'); return; }
        const req = id
            ? $.ajax({ url: '/api/todos/' + id, method: 'PUT', contentType: 'application/json', data: JSON.stringify(payload) })
            : $.ajax({ url: '/api/todos', method: 'POST', contentType: 'application/json', data: JSON.stringify(payload) });
        req.done(() => { resetForm(); loadTodos(); });
    }

    function editTodo(id) {
        $.get('/api/todos/' + id, function (res) {
            const t = res.data;
            $('#todoId').val(t.id);
            $('#title').val(t.title);
            $('#description').val(t.description || '');
            $('#priority').val(t.priority);
            $('#dueDate').val(t.dueDate ? serverToLocal(t.dueDate) : '');
            $('#timeHint').addClass('d-none');
            $('#formTitle').text('编辑待办 #' + t.id);
        });
    }

    function toggleTodo(id) {
        $.ajax({ url: '/api/todos/' + id + '/toggle', method: 'PATCH' }).done(loadTodos);
    }

    function delTodo(id) {
        if (!confirm('确认删除？')) return;
        $.ajax({ url: '/api/todos/' + id, method: 'DELETE' }).done(loadTodos);
    }

    function resetForm() {
        $('#todoId').val('');
        $('#title').val('');
        $('#description').val('');
        $('#priority').val('MEDIUM');
        $('#dueDate').val('');
        $('#timeHint').addClass('d-none');
        manualTime = false;
        $('#formTitle').text('新增待办');
    }

    function filter(val, btn) {
        currentFilter = val;
        $('.btn-group .btn').removeClass('active');
        $(btn).addClass('active');
        loadTodos();
    }

    function esc(s) { return (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    $(function () { loadTodos(); });
</script>
</body>
</html>
