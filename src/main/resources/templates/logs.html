<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments :: head('使用统计 · my tools')}"></head>
<body>
<div th:replace="~{fragments :: nav('logs')}"></div>

<div class="container mt-4">
    <h4 class="section-title">📊 工具使用统计</h4>

    <div class="card">
        <div class="card-body">
            <table class="table table-hover bg-white">
                <thead><tr><th>工具</th><th>分类</th><th>使用次数</th><th>占比</th><th>最近使用</th></tr></thead>
                <tbody id="statBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function load() {
        $.get('/api/logs/stats', function (res) {
            const body = $('#statBody');
            body.empty();
            const list = res.data || [];
            const max = list.length ? list[0].useCount : 1;
            if (!list.length) { body.append('<tr><td colspan="5" class="text-muted text-center">暂无记录</td></tr>'); return; }
            list.forEach(l => {
                const pct = max > 0 ? Math.round(l.useCount / max * 100) : 0;
                body.append(`<tr>
                    <td>${l.toolName}</td>
                    <td>${l.toolCategory || '-'}</td>
                    <td>${l.useCount}</td>
                    <td><div class="progress" style="height:18px"><div class="progress-bar" style="width:${pct}%">${pct}%</div></div></td>
                    <td>${l.lastUsedAt ? l.lastUsedAt.replace('T', ' ') : '-'}</td>
                </tr>`);
            });
        });
    }
    $(function () { load(); });
</script>
</body>
</html>
