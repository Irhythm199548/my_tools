<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">my tools</title>
    <!-- Bootstrap 5 + jQuery（纯 CDN，无需 Node.js 构建） -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <!-- CSRF 令牌（Spring Security 开启 CSRF 时由请求属性提供） -->
    <meta name="_csrf" th:content="${_csrf != null} ? ${_csrf.token} : ''"/>
    <meta name="_csrf_header" th:content="${_csrf != null} ? ${_csrf.headerName} : ''"/>
    <script>
        // 全局 AJAX：为非 GET 请求自动注入 CSRF 令牌
        (function () {
            var token = $('meta[name="_csrf"]').attr('content');
            var header = $('meta[name="_csrf_header"]').attr('content');
            if (token && header) {
                $.ajaxSetup({
                    beforeSend: function (xhr) {
                        var type = (this.type || '').toUpperCase();
                        if (type !== 'GET' && type !== 'HEAD') {
                            xhr.setRequestHeader(header, token);
                        }
                    }
                });
            }
        })();
    </script>
    <style>
        body { background: #f5f6f8; }
        .card-link { text-decoration: none; color: inherit; }
        .card-link:hover .card { transform: translateY(-3px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.12); }
        .tool-icon { font-size: 1.6rem; }
        pre.result, .result-box {
            background: #1e1e2e; color: #e4e4e7; padding: 12px;
            border-radius: 8px; white-space: pre-wrap; word-break: break-all; font-size: .9rem;
        }
        .diff-table td { font-family: monospace; white-space: pre-wrap; vertical-align: top; }
        .diff-del { background: #f8d7da !important; }
        .diff-ins { background: #d1e7dd !important; }
        .diff-sign { width: 28px; text-align: center; font-weight: bold; }
        mark { background: #fff3cd; padding: 0 2px; }
        .section-title { border-left: 4px solid #0d6efd; padding-left: 8px; margin: 18px 0 12px; }
    </style>
</head>
<body>
<nav th:fragment="nav(active)" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">🛠️ my tools</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:classappend="${active}=='home' ? 'active' : ''" href="/">首页</a></li>
                <li class="nav-item" th:each="t : ${enabledToolMetas}">
                    <a class="nav-link" th:classappend="${active == t.key} ? 'active' : ''"
                       th:href="${t.url}" th:text="${t.icon + ' ' + t.label}"></a>
                </li>
                <li class="nav-item"><a class="nav-link" th:classappend="${active}=='personal' ? 'active' : ''" href="/personal">个人中心</a></li>
            </ul>
            <div class="d-flex align-items-center text-white me-3" th:if="${me != null}">
                <img th:if="${me.avatar != null}" th:src="${me.avatar}" class="rounded-circle me-2"
                     style="width:28px;height:28px;object-fit:cover;" alt="头像"/>
                <span class="me-2" th:text="${me.nickname}">用户</span>
            </div>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button type="submit" class="btn btn-outline-light btn-sm">退出登录</button>
            </form>
        </div>
    </div>
</nav>
</body>
</html>
