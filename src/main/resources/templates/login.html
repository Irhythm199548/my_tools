<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments :: head( title='登录 - my tools')}"></head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">🛠️ my tools 登录</h3>
                    <div th:if="${param.error}" class="alert alert-danger">用户名或密码错误</div>
                    <div th:if="${param.logout}" class="alert alert-success">您已安全退出</div>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" name="username" class="form-control" required="required" autofocus="autofocus"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" name="password" class="form-control" required="required"/>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">登录</button>
                    </form>
                    <p class="text-muted small mt-3 mb-0">本服务已开启登录鉴权，凭据见服务端 application.yml 或启动日志。</p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
