<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{fragments :: head('my tools · 个人工作台')}"></head>
<body>
<div th:replace="~{fragments :: nav('home')}"></div>

<div class="container mt-4">
    <div class="p-4 mb-4 bg-white rounded-3 shadow-sm">
        <h2 class="fw-bold">👋 欢迎使用 my tools</h2>
        <p class="text-muted mb-0">集成多种开发工具的个人工作台</p>
        <!--· Spring Boot 2.7 + JDK 1.8 + MySQL 8.0-->
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <div class="tool-icon">📝</div>
                    <h5 class="card-title mt-2">待办事项</h5>
                    <p class="card-text">未完成：<span th:text="${todoCount}">0</span></p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <div class="tool-icon">🍅</div>
                    <h5 class="card-title mt-2">今日专注</h5>
                    <p class="card-text"><span th:text="${focusToday}">0</span> 秒</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info">
                <div class="card-body">
                    <div class="tool-icon">🧰</div>
                    <h5 class="card-title mt-2">工具模块</h5>
                    <p class="card-text">编码 · 文本 · 转换 · 网络 · 辅助</p>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-secondary">
                <div class="card-body">
                    <div class="tool-icon">📊</div>
                    <h5 class="card-title mt-2">使用统计</h5>
                    <p class="card-text">工具调用次数追踪</p>
                </div>
            </div>
        </div>
    </div>

    <h4 class="section-title">快捷入口</h4>
    <div class="row g-3">
        <div class="col-6 col-md-3">
            <a class="card card-link" href="/encode"><div class="card-body"><div class="tool-icon">🔐</div><h6>编码工具</h6></div></a>
        </div>
        <div class="col-6 col-md-3">
            <a class="card card-link" href="/text"><div class="card-body"><div class="tool-icon">📄</div><h6>文本处理</h6></div></a>
        </div>
        <div class="col-6 col-md-3">
            <a class="card card-link" href="/convert"><div class="card-body"><div class="tool-icon">🔄</div><h6>格式转换</h6></div></a>
        </div>
        <div class="col-6 col-md-3">
            <a class="card card-link" href="/network"><div class="card-body"><div class="tool-icon">🌐</div><h6>网络与安全</h6></div></a>
        </div>
        <div class="col-6 col-md-3">
            <a class="card card-link" href="/auxs"><div class="card-body"><div class="tool-icon">🧩</div><h6>辅助工具</h6></div></a>
        </div>
        <div class="col-6 col-md-3">
            <a class="card card-link" href="/cron"><div class="card-body"><div class="tool-icon">⏰</div><h6>Cron 表达式</h6></div></a>
        </div>
        <div class="col-6 col-md-3">
            <a class="card card-link" href="/pomodoro"><div class="card-body"><div class="tool-icon">🍅</div><h6>番茄钟</h6></div></a>
        </div>
        <div class="col-6 col-md-3">
            <a class="card card-link" href="/logs"><div class="card-body"><div class="tool-icon">📊</div><h6>使用统计</h6></div></a>
        </div>
    </div>

    <h4 class="section-title">热门工具（使用次数 Top）</h4>
    <table class="table table-sm table-striped bg-white">
        <thead><tr><th>工具</th><th>分类</th><th>使用次数</th><th>最近使用</th></tr></thead>
        <tbody>
        <tr th:each="log : ${toolUsage}">
            <td th:text="${log.toolName}">-</td>
            <td th:text="${log.toolCategory}">-</td>
            <td th:text="${log.useCount}">0</td>
            <td th:text="${#dates.format(log.lastUsedAt,'yyyy-MM-dd HH:mm')}">-</td>
        </tr>
        <tr th:if="${#lists.isEmpty(toolUsage)}">
            <td colspan="4" class="text-muted text-center">暂无使用记录</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
